<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>過去の論文一覧 | 東京外国語大学図書館</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* アーカイブ固有レイアウト（style.css の .widget スタイルを上書き） */
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px 16px 40px;
      align-items: flex-start;
    }
    .arc-container {
      max-width: 460px;
      margin: 0 auto;
    }
    .arc-nav {
      margin-bottom: 14px;
    }
    .arc-nav a {
      font-size: 13px;
      color: #b5406e;
      text-decoration: none;
      font-weight: 600;
    }
    .arc-nav a:hover { text-decoration: underline; }
    .arc-title {
      font-size: 16px;
      font-weight: 700;
      color: #7a1f4a;
      margin-bottom: 12px;
      font-family: 'Noto Serif JP', serif;
    }
    .arc-date-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .arc-date-list li button {
      background: #fff;
      border: 1.5px solid #e8c4d4;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #7a1f4a;
      font-family: 'Noto Sans JP', sans-serif;
      transition: background 0.15s, color 0.15s;
    }
    .arc-date-list li button:hover,
    .arc-date-list li button.active {
      background: #b5406e;
      color: #fff;
      border-color: #b5406e;
    }
    .arc-loading {
      padding: 20px 0;
      text-align: center;
      color: #8a9bb0;
      font-size: 13px;
    }
    /* アーカイブ内の .widget はシャドウなしで表示 */
    #tda-root .widget {
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    }
  </style>
</head>
<body>
  <div class="arc-container">
    <div class="arc-nav">
      <a href="./index.html">← 今日の論文に戻る</a>
    </div>
    <div class="arc-title">過去の論文一覧</div>
    <ul class="arc-date-list" id="arc-date-list">
      <li><span class="arc-loading">読み込み中…</span></li>
    </ul>
    <div id="tda-root"></div>
  </div>

  <script>
    (function () {
      const CONFIG = {
        VPN_PAGE_URL: 'https://www.tufs.ac.jp/library/top/search/vpn/',  // ← 実際のURLに変更してください
      };
      const INDEX_URL    = '../data/archive-index.json';
      const ARCHIVE_BASE = '../data/archive/';

      const dateList = document.getElementById('arc-date-list');
      const root     = document.getElementById('tda-root');
      let activeBtn  = null;

      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function formatDateLabel(dateStr) {
        const parts = (dateStr || '').split('-');
        const m = parts.length >= 3 ? parseInt(parts[1]) : parseInt(parts[0]);
        const d = parts.length >= 3 ? parseInt(parts[2]) : parseInt(parts[1]);
        return (m && d) ? `${m}月${d}日` : dateStr;
      }

      // 新旧両フォーマットに対応してデータを正規化
      function normalize(data) {
        const parts = (data.date || '').split('-');
        const month = parseInt(parts.length >= 3 ? parts[1] : parts[0]) || '';
        const day   = parseInt(parts.length >= 3 ? parts[2] : parts[1]) || '';

        let eventYear = '', eventText = '';
        if (data.event) {
          eventYear = data.event.year || '';
          eventText = data.event.text || '';
        } else if (data.today_topic) {
          const m = (data.today_topic.text || '').match(/^(\d{4})年\s*[-－]\s*(.+)$/);
          if (m) { eventYear = m[1]; eventText = m[2]; }
          else     eventText = data.today_topic.text || '';
        }

        const p  = data.paper    || {};
        const db = data.database || {};

        let author = '';
        if (p.author) {
          author = p.author;
        } else if (Array.isArray(p.authors) && p.authors.length > 0) {
          author = p.authors[0] + (p.authors.length > 1 ? ' ほか' : '');
        }

        return { month, day, eventYear, eventText, author, p, db };
      }

      function render(data) {
        const { month, day, eventYear, eventText, author, p, db } = normalize(data);
        const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=56x56&data='
                    + encodeURIComponent(CONFIG.VPN_PAGE_URL);

        root.innerHTML = `
          <div class="widget">
            <div class="header">
              <div class="header-label">Today in History</div>
              <div class="header-date">
                今日は何の日？<br>
                <span>— ${month}月${day}日</span>
              </div>
            </div>
            <div class="event-section">
              <div class="event-label">Today's Event</div>
              <div class="event-text">
                ${eventYear ? `<span class="event-year">${escapeHtml(String(eventYear))}年</span> — ` : ''}${escapeHtml(eventText)}
              </div>
            </div>
            ${p.connection ? `
            <div class="connection-section">
              <div class="connection-text">${p.connection}</div>
            </div>` : ''}
            <div class="paper-card">
              <div class="paper-title">${escapeHtml(p.title || '')}</div>
              ${p.abstract_ja ? `
              <div class="abstract-box">
                <div class="abstract-text">${escapeHtml(p.abstract_ja)}</div>
                <div class="abstract-note">機械翻訳による要約です。原文と異なる場合があります。</div>
              </div>` : ''}
              <div class="paper-meta">
                ${author    ? `<span>著者｜${escapeHtml(author)}</span>` : ''}
                ${p.journal ? `<span>掲載誌｜${escapeHtml(p.journal)}</span>` : ''}
                ${p.year    ? `<span>出版年｜${escapeHtml(String(p.year))}</span>` : ''}
              </div>
              ${p.doi_url ? `<a class="btn-primary" href="${escapeHtml(p.doi_url)}" target="_blank" rel="noopener">この論文を読む →</a>` : ''}
            </div>
            <div class="db-card">
              <div class="db-label">この論文が読めるデータベース</div>
              <div class="db-name">${escapeHtml(db.name || '')}</div>
              <div class="db-desc">${escapeHtml(db.description || '')}</div>
              <div class="vpn-notice">大学ネットワークまたはVPN接続が必要</div>
              <div class="vpn-access">
                <div class="vpn-qr">
                  <img src="${qrSrc}" alt="VPN設定ページQRコード" width="56" height="56">
                </div>
                <div class="vpn-link-area">
                  <div class="vpn-link-label">VPN接続方法</div>
                  <a class="vpn-link" href="${escapeHtml(CONFIG.VPN_PAGE_URL)}" target="_blank" rel="noopener">大学VPN設定ページへ</a>
                </div>
              </div>
              ${db.url ? `<a class="btn-secondary" href="${escapeHtml(db.url)}" target="_blank" rel="noopener">データベースへアクセス →</a>` : ''}
            </div>
          </div>`;
      }

      function loadArticle(dateStr, btn) {
        if (activeBtn) activeBtn.classList.remove('active');
        activeBtn = btn;
        btn.classList.add('active');
        root.innerHTML = '<div class="arc-loading">読み込み中…</div>';
        fetch(ARCHIVE_BASE + dateStr + '.json')
          .then(function (res) {
            if (!res.ok) throw new Error(res.status);
            return res.json();
          })
          .then(render)
          .catch(function () {
            root.innerHTML = '<p class="tda-error">データを読み込めませんでした。</p>';
          });
      }

      // ── 日付リスト取得 ──
      fetch(INDEX_URL)
        .then(function (res) {
          if (!res.ok) throw new Error(res.status);
          return res.json();
        })
        .then(function (dates) {
          dateList.innerHTML = '';
          if (!dates || dates.length === 0) {
            dateList.innerHTML = '<li><span style="font-size:13px;color:#8a9bb0;">記事がまだありません。</span></li>';
            return;
          }
          dates.forEach(function (dateStr, i) {
            const li  = document.createElement('li');
            const btn = document.createElement('button');
            btn.textContent = formatDateLabel(dateStr);
            btn.setAttribute('aria-label', dateStr + 'の論文を表示');
            btn.addEventListener('click', function () { loadArticle(dateStr, btn); });
            li.appendChild(btn);
            dateList.appendChild(li);
            if (i === 0) loadArticle(dateStr, btn);  // 最新を自動表示
          });
        })
        .catch(function () {
          dateList.innerHTML = '<li><span style="font-size:13px;color:#c0392b;">一覧の取得に失敗しました。</span></li>';
        });
    })();
  </script>
</body>
</html>
