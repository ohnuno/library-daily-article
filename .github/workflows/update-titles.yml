name: Update ISSN Master

on:
  schedule:
    - cron: '0 16 1 * *'  # 毎月1日 JST 1:00（UTC 16:00）
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ISSN master update
        run: python scripts/update_issn_master.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/issn-master.json
          git diff --staged --quiet || \
            git commit -m "chore: update ISSN master [$(date +%Y-%m)]"
          git push
