name: Daily Article Update

on:
  schedule:
    - cron: '30 15 * * *'  # JST 0:30（UTC 15:30）
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily batch
        run: python scripts/fetch_daily.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONTACT_EMAIL:  ${{ secrets.CONTACT_EMAIL }}
          TUFS_ROR_ID:    https://ror.org/03f4q9q08

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          git diff --staged --quiet || \
            git commit -m "chore: update today's article [$(date +%Y-%m-%d)]"
          git push
